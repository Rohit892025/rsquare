<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RSquare">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <title>RSquare Music Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Variables ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c26;
      --border: rgba(255,255,255,0.06);
      --accent: #7c6aef;
      --accent-dim: rgba(124,106,239,0.18);
      --text: #f0f0f8;
      --text2: #9090a8;
      --text3: #5c5c78;
      --danger: #ef6a6a;
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.18s ease;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --header-h: 64px;
      --bottom-h: 120px; /* mini player + nav */
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── App Shell ──────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 420px;
      margin: 0 auto;
      position: relative;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: calc(var(--header-h) + var(--safe-top));
      padding-top: var(--safe-top);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 20px;
      padding-right: 16px;
      z-index: 100;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #header-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #7c6aef, #5b8ef5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    #header-actions { display: flex; gap: 8px; }

    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }
    .icon-btn:active { transform: scale(0.94); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ── View Container ──────────────────────────────────────────────────── */
    #view-container {
      flex: 1;
      overflow: hidden;
      margin-top: calc(var(--header-h) + var(--safe-top));
      margin-bottom: var(--bottom-h);
      position: relative;
    }

    .view {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }
    .view.active { opacity: 1; pointer-events: all; }

    /* ── Library View ────────────────────────────────────────────────────── */
    #library-view { padding: 0; }

    #stats-bar {
      padding: 10px 20px 6px;
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    #track-list { list-style: none; padding: 0 10px 10px; }

    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background var(--transition);
      position: relative;
    }
    .track-item:hover { background: var(--surface); }
    .track-item.active { background: var(--accent-dim); }
    .track-item.active .track-title { color: var(--accent); }

    .track-art {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .track-art img { width: 100%; height: 100%; object-fit: cover; }

    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .track-artist {
      font-size: 12px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .track-duration {
      font-size: 12px;
      color: var(--text3);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    /* ── Empty State ─────────────────────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
      text-align: center;
      gap: 16px;
    }
    #empty-state .empty-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
    }
    #empty-state .empty-icon svg { width: 32px; height: 32px; color: var(--accent); }
    #empty-state h2 { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 600; color: var(--text); }
    #empty-state p { font-size: 14px; color: var(--text2); line-height: 1.5; }
    #empty-add-btn {
      margin-top: 4px;
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
    }
    #empty-add-btn:hover { opacity: 0.88; }
    #empty-add-btn:active { transform: scale(0.96); }

    /* Desktop add music options */
    #add-options {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      z-index: 200;
      min-width: 160px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #add-options.open { display: block; }
    .add-option {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      transition: background var(--transition);
    }
    .add-option:hover { background: rgba(255,255,255,0.05); }
    .add-option svg { width: 16px; height: 16px; color: var(--text2); }
    #add-btn-wrapper { position: relative; }

    /* ── Now Playing View ────────────────────────────────────────────────── */
    #now-playing-view {
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      overflow: hidden;
    }

    #np-scrollable {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 24px 24px;
      gap: 0;
    }

    #np-art-wrapper {
      width: min(300px, 70vw);
      height: min(300px, 70vw);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      margin: 8px 0 24px;
      flex-shrink: 0;
      position: relative;
    }
    #np-art-wrapper img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    #np-art-wrapper .no-art-icon {
      width: 80px; height: 80px;
      color: var(--text3);
    }
    #np-art-wrapper.spinning img {
      animation: spin 20s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #np-info { width: 100%; text-align: center; margin-bottom: 20px; }
    #np-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
      letter-spacing: -0.2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      padding: 0 8px;
    }
    #np-artist {
      font-size: 14px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* Progress bar */
    #progress-container {
      width: 100%;
      margin-bottom: 20px;
      user-select: none;
    }
    #progress-bar-track {
      width: 100%;
      height: 4px;
      background: var(--surface2);
      border-radius: 4px;
      position: relative;
      cursor: pointer;
      padding: 10px 0; /* bigger hit area */
      margin: -10px 0;
    }
    #progress-bar-track::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 100%; height: 4px;
      background: var(--surface2);
      border-radius: 4px;
    }
    #progress-fill {
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      height: 4px;
      background: var(--accent);
      border-radius: 4px;
      width: 0%;
      pointer-events: none;
      transition: width 0.25s linear;
    }
    #progress-knob {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%) scale(0);
      width: 14px; height: 14px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      transition: transform 0.15s ease;
    }
    #progress-bar-track:hover #progress-knob,
    #progress-bar-track.dragging #progress-knob {
      transform: translate(-50%, -50%) scale(1);
    }
    #progress-bar-track.dragging #progress-fill {
      transition: none;
    }
    #time-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
      font-size: 11px;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
    }

    /* Transport controls */
    #transport {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-bottom: 8px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: color var(--transition), transform var(--transition), background var(--transition);
      padding: 10px;
    }
    .ctrl-btn:hover { color: var(--text); background: var(--accent-dim); }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn.active { color: var(--accent); }
    .ctrl-btn svg { display: block; }

    #btn-play-pause {
      width: 64px; height: 64px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      flex-shrink: 0;
    }
    #btn-play-pause:hover { opacity: 0.88; }
    #btn-play-pause:active { transform: scale(0.94); }
    #btn-play-pause svg { width: 28px; height: 28px; }

    .ctrl-btn-lg svg { width: 26px; height: 26px; }
    .ctrl-btn-sm svg { width: 22px; height: 22px; }

    #btn-repeat { position: relative; }
    #repeat-badge {
      position: absolute;
      top: 4px; right: 4px;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      font-size: 8px;
      font-weight: 700;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }

    /* Volume (desktop only) */
    #volume-row {
      display: none;
      width: 100%;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    #volume-row svg { width: 16px; height: 16px; color: var(--text3); flex-shrink: 0; }
    #volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 3px;
      background: var(--surface2);
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    #volume-slider::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    /* ── Mini Player ─────────────────────────────────────────────────────── */
    #mini-player {
      position: fixed;
      bottom: calc(54px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      display: none;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      z-index: 90;
      transition: opacity var(--transition);
    }
    #mini-player.visible { display: flex; }

    #mini-art {
      width: 40px; height: 40px;
      border-radius: 6px;
      background: var(--surface2);
      overflow: hidden;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #mini-art img { width: 100%; height: 100%; object-fit: cover; }
    #mini-art svg { width: 18px; height: 18px; color: var(--text3); }

    #mini-info { flex: 1; min-width: 0; }
    #mini-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #mini-artist { font-size: 12px; color: var(--text2); }

    #mini-play {
      background: none; border: none;
      color: var(--text);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: color var(--transition), background var(--transition);
      flex-shrink: 0;
    }
    #mini-play:hover { background: var(--accent-dim); }
    #mini-play svg { width: 22px; height: 22px; }

    #mini-progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 2px;
      background: var(--accent);
      width: 0%;
      border-radius: 0 2px 2px 0;
    }

    /* ── Bottom Nav ──────────────────────────────────────────────────────── */
    #bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 420px;
      height: calc(54px + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: var(--bg);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }

    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      color: var(--text3);
      font-size: 11px;
      font-weight: 500;
      transition: color var(--transition);
      border: none;
      background: none;
    }
    .nav-tab.active { color: var(--accent); }
    .nav-tab svg { width: 22px; height: 22px; }

    /* ── Loading Overlay ─────────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.85);
      backdrop-filter: blur(8px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 999;
    }
    #loading-overlay.visible { display: flex; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: rotate 0.8s linear infinite;
    }
    @keyframes rotate { to { transform: rotate(360deg); } }

    #loading-text {
      font-size: 14px;
      color: var(--text2);
      text-align: center;
      max-width: 240px;
    }

    /* ── Toast ────────────────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      top: calc(var(--header-h) + var(--safe-top) + 10px);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 1000;
      pointer-events: none;
      width: 100%;
      max-width: 380px;
      padding: 0 16px;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 16px;
      border-radius: 50px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      animation: toastIn 0.25s ease, toastOut 0.25s ease 2.75s forwards;
      pointer-events: none;
    }
    .toast.error { border-color: rgba(239,106,106,0.3); color: var(--danger); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-10px); }
    }

    /* ── Desktop adjustments ─────────────────────────────────────────────── */
    @media (hover: hover) and (pointer: fine) {
      #volume-row { display: flex; }
      #now-playing-view { padding-bottom: 16px; }
    }

    /* Version badge */
    #version-badge {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      padding: 16px 0 24px;
      letter-spacing: 0.3px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    /* ── EQ Panel ─────────────────────────────────────────────────────────── */
    #btn-eq.active { color: var(--accent); }

    #eq-panel {
      width: 100%;
      overflow-y: auto;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.32s ease, opacity 0.22s ease, margin-top 0.22s ease;
      margin-top: 0;
      padding: 0 16px;
      background: var(--bg);
    }
    #eq-panel.open {
      max-height: 500px;
      opacity: 1;
      margin-top: 12px;
    }

    #eq-presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }
    .eq-preset-btn {
      padding: 6px 14px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      white-space: nowrap;
    }
    .eq-preset-btn:hover { background: var(--surface); color: var(--text); }
    .eq-preset-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    .eq-sliders { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
    .eq-slider-row { display: flex; align-items: center; gap: 10px; }
    .eq-label {
      font-size: 12px;
      color: var(--text2);
      width: 62px;
      flex-shrink: 0;
      text-align: right;
    }
    .eq-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 3px;
      background: var(--surface2);
      outline: none;
      cursor: pointer;
    }
    .eq-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    .eq-slider::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }
    .eq-val {
      font-size: 11px;
      color: var(--text3);
      width: 30px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .eq-toggles { display: flex; gap: 8px; justify-content: center; }
    .eq-toggle-btn {
      padding: 7px 16px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
    }
    .eq-toggle-btn:hover { background: var(--surface); color: var(--text); }
    .eq-toggle-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header id="header">
    <span id="header-title">RSquare</span>
    <div id="header-actions">
      <div id="add-btn-wrapper">
        <button class="icon-btn" id="btn-add" title="Add Music" aria-label="Add Music">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════════════════════
// Service Worker Registration
// ══════════════════════════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// IndexedDB Layer
// ══════════════════════════════════════════════════════════════════════════════
const DB_NAME = 'RSquareMusicDB';
const DB_VERSION = 1;
const STORE_NAME = 'tracks';
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    req.onsuccess = e => { _db = e.target.result; resolve(_db); };
    req.onerror = e => reject(e.target.error);
  });
}

function saveTrack(track) {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    // Only add if not already present
    const getReq = store.get(track.id);
    getReq.onsuccess = () => {
      if (getReq.result) { resolve(false); return; }
      const putReq = store.put(track);
      putReq.onsuccess = () => resolve(true);
      putReq.onerror = () => resolve(false);
    };
    getReq.onerror = () => resolve(false);
  }));
}

function getAllTracks() {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = e => reject(e.target.error);
  }));
}

function clearTracksDB() {
  return openDB().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const req = tx.objectStore(STORE_NAME).clear();
    req.onsuccess = () => resolve();
    req.onerror = e => reject(e.target.error);
  }));
}

// ══════════════════════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════════════════════
const state = {
  tracks: [],
  queue: [],             // array of indices into state.tracks
  currentQueueIdx: 0,
  isPlaying: false,
  shuffle: false,
  repeat: 'off',         // 'off' | 'all' | 'one'
  currentView: 'library',
  audio: (() => { const a = new Audio(); a.preload = 'auto'; return a; })(),
  artBlobURLs: new Map(), // trackId → blobURL
  audioBlobURL: null,     // current audio blob URL
};

function currentTrack() {
  const idx = state.queue[state.currentQueueIdx];
  return idx !== undefined ? state.tracks[idx] : null;
}

// ══════════════════════════════════════════════════════════════════════════════
// Web Audio API — Full enhancement chain + iOS AudioContext unlock
// ══════════════════════════════════════════════════════════════════════════════
let _audioCtx = null, _gainNode = null, _srcNode = null;
let _eqLow = null, _eqBass = null, _eqMid = null, _eqPresence = null, _eqAir = null;
let _compressor = null;
let _exciterLP = null, _exciterWS = null, _exciterGain = null;

function _makeExciterCurve(amount) {
  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

function ensureAudioContext() {
  if (_audioCtx) { if (_audioCtx.state === 'suspended') _audioCtx.resume(); return; }
  try {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // EQ bands
    _eqLow = _audioCtx.createBiquadFilter();
    _eqLow.type = 'lowshelf'; _eqLow.frequency.value = 60; _eqLow.gain.value = 0;

    _eqBass = _audioCtx.createBiquadFilter();
    _eqBass.type = 'peaking'; _eqBass.frequency.value = 200; _eqBass.Q.value = 1; _eqBass.gain.value = 0;

    _eqMid = _audioCtx.createBiquadFilter();
    _eqMid.type = 'peaking'; _eqMid.frequency.value = 1000; _eqMid.Q.value = 1; _eqMid.gain.value = 0;

    _eqPresence = _audioCtx.createBiquadFilter();
    _eqPresence.type = 'peaking'; _eqPresence.frequency.value = 4000; _eqPresence.Q.value = 1; _eqPresence.gain.value = 0;

    _eqAir = _audioCtx.createBiquadFilter();
    _eqAir.type = 'highshelf'; _eqAir.frequency.value = 12000; _eqAir.gain.value = 0;

    // Dynamics compressor
    _compressor = _audioCtx.createDynamicsCompressor();
    _compressor.threshold.value = -24; _compressor.knee.value = 30;
    _compressor.ratio.value = 4; _compressor.attack.value = 0.003; _compressor.release.value = 0.25;

    // Master gain
    _gainNode = _audioCtx.createGain(); _gainNode.gain.value = 0.8;

    // Bass exciter parallel path
    _exciterLP = _audioCtx.createBiquadFilter();
    _exciterLP.type = 'lowpass'; _exciterLP.frequency.value = 120;
    _exciterWS = _audioCtx.createWaveShaper();
    _exciterWS.curve = _makeExciterCurve(10); _exciterWS.oversample = '2x';
    _exciterGain = _audioCtx.createGain(); _exciterGain.gain.value = 0;

    // Wire main chain: src → low → bass → mid → presence → air → compressor → gain → dest
    _srcNode = _audioCtx.createMediaElementSource(state.audio);
    _srcNode.connect(_eqLow);
    _eqLow.connect(_eqBass);
    _eqBass.connect(_eqMid);
    _eqMid.connect(_eqPresence);
    _eqPresence.connect(_eqAir);
    _eqAir.connect(_compressor);
    _compressor.connect(_gainNode);
    _gainNode.connect(_audioCtx.destination);

    // Wire exciter parallel: src → LP → WaveShaper → exciterGain → gainNode
    _srcNode.connect(_exciterLP);
    _exciterLP.connect(_exciterWS);
    _exciterWS.connect(_exciterGain);
    _exciterGain.connect(_gainNode);

    // Apply stored EQ state immediately
    applyEQ(eqState);
  } catch (_) { _audioCtx = null; }
}

// ══════════════════════════════════════════════════════════════════════════════
// EQ — State, Presets, Apply
// ══════════════════════════════════════════════════════════════════════════════
const EQ_STORAGE_KEY = 'rsquare-eq';
const EQ_PRESETS = {
  flat:       { subBass:  0, bass:  0, mid:  0, presence:  0, air:  0, exciter: false, compressor: false },
  bass:       { subBass:  6, bass:  4, mid:  0, presence:  0, air:  1, exciter: true,  compressor: true  },
  headphones: { subBass:  3, bass:  1, mid: -1, presence:  2, air:  4, exciter: false, compressor: false },
  vocal:      { subBass: -1, bass: -2, mid:  3, presence:  4, air:  2, exciter: false, compressor: true  },
  punjabi:    { subBass:  5, bass:  4, mid:  0, presence:  2, air:  2, exciter: true,  compressor: true  },
};
let eqState = { preset: 'flat', subBass: 0, bass: 0, mid: 0, presence: 0, air: 0, exciter: false, compressor: false };

function loadEQState() {
  try {
    const s = localStorage.getItem(EQ_STORAGE_KEY);
    if (!s) return;
    const p = JSON.parse(s);
    if (typeof p !== 'object' || !p) return;
    eqState = {
      preset:     typeof p.preset     === 'string'  ? p.preset     : 'flat',
      subBass:    typeof p.subBass    === 'number'  ? p.subBass    : 0,
      bass:       typeof p.bass       === 'number'  ? p.bass       : 0,
      mid:        typeof p.mid        === 'number'  ? p.mid        : 0,
      presence:   typeof p.presence   === 'number'  ? p.presence   : 0,
      air:        typeof p.air        === 'number'  ? p.air        : 0,
      exciter:    typeof p.exciter    === 'boolean' ? p.exciter    : false,
      compressor: typeof p.compressor === 'boolean' ? p.compressor : false,
    };
  } catch (_) {}
}

function saveEQState() {
  try { localStorage.setItem(EQ_STORAGE_KEY, JSON.stringify(eqState)); } catch (_) {}
}

function applyEQ(s) {
  if (!_audioCtx || !_eqLow) return;
  const clamp = v => Math.max(-12, Math.min(12, v));
  _eqLow.gain.value      = clamp(s.subBass);
  _eqBass.gain.value     = clamp(s.bass);
  _eqMid.gain.value      = clamp(s.mid);
  _eqPresence.gain.value = clamp(s.presence);
  _eqAir.gain.value      = clamp(s.air);
  // Compressor bypass: disconnect-all + reconnect (iOS-safe — avoids targeted disconnect)
  try { _eqAir.disconnect(); } catch (_) {}
  if (s.compressor) {
    _eqAir.connect(_compressor);
    _compressor.connect(_gainNode);
  } else {
    _eqAir.connect(_gainNode);
  }
  _exciterGain.gain.value = s.exciter ? 0.25 : 0;
}

// ══════════════════════════════════════════════════════════════════════════════
// Metadata Extraction
// ══════════════════════════════════════════════════════════════════════════════
const AUDIO_EXTS = /\.(mp3|m4a|wav|ogg|flac|aac|opus|wma)$/i;

// MIME type map — tells iOS which hardware decoder to use (critical for M4A/AAC)
const AUDIO_MIME = {
  mp3:  'audio/mpeg',
  m4a:  'audio/mp4',
  aac:  'audio/aac',
  wav:  'audio/wav',
  ogg:  'audio/ogg',
  flac: 'audio/flac',
  opus: 'audio/ogg; codecs=opus',
  wma:  'audio/x-ms-wma',
};
function mimeForFile(fileName) {
  const ext = (fileName.split('.').pop() || '').toLowerCase();
  return AUDIO_MIME[ext] || '';
}

function nameWithoutExt(name) {
  return name.replace(/\.[^/.]+$/, '');
}

function extractMetadata(file) {
  return new Promise(resolve => {
    const id = `${file.name}_${file.size}`;
    const defaults = {
      id,
      title: nameWithoutExt(file.name),
      artist: 'Unknown Artist',
      album: 'Unknown Album',
      artData: null,
      duration: 0,
      fileName: file.name,
      mimeType: mimeForFile(file.name),
    };

    const finish = (meta, audioData) => resolve({ ...defaults, ...meta, audioData });

    file.arrayBuffer().then(audioData => {
      if (typeof window.jsmediatags === 'undefined') {
        finish({}, audioData);
        return;
      }
      try {
        window.jsmediatags.read(file, {
          onSuccess: tag => {
            const t = tag.tags || {};
            const meta = {};
            if (t.title) meta.title = t.title;
            if (t.artist) meta.artist = t.artist;
            if (t.album) meta.album = t.album;
            if (t.picture) {
              meta.artData = { data: new Uint8Array(t.picture.data), format: t.picture.format };
            }
            finish(meta, audioData);
          },
          onError: () => finish({}, audioData),
        });
      } catch (_) {
        finish({}, audioData);
      }
    }).catch(() => finish({}, null));
  });
}

function getArtBlobURL(track) {
  if (state.artBlobURLs.has(track.id)) return state.artBlobURLs.get(track.id);
  if (!track.artData) return null;
  const blob = new Blob([track.artData.data], { type: track.artData.format || 'image/jpeg' });
  const url = URL.createObjectURL(blob);
  state.artBlobURLs.set(track.id, url);
  return url;
}

// ══════════════════════════════════════════════════════════════════════════════
// Queue / Shuffle
// ══════════════════════════════════════════════════════════════════════════════
function buildQueue(startTrackIndex) {
  const n = state.tracks.length;
  if (n === 0) { state.queue = []; state.currentQueueIdx = 0; return; }

  if (state.shuffle) {
    const indices = Array.from({ length: n }, (_, i) => i);
    // Fisher-Yates
    for (let i = n - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    // Put current track first
    if (startTrackIndex !== undefined) {
      const pos = indices.indexOf(startTrackIndex);
      if (pos > 0) { [indices[0], indices[pos]] = [indices[pos], indices[0]]; }
    }
    state.queue = indices;
    state.currentQueueIdx = 0;
  } else {
    state.queue = Array.from({ length: n }, (_, i) => i);
    state.currentQueueIdx = startTrackIndex !== undefined
      ? startTrackIndex
      : Math.min(state.currentQueueIdx, n - 1);
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// Playback Engine
// ══════════════════════════════════════════════════════════════════════════════
function loadTrack(queueIdx, autoplay) {
  state.currentQueueIdx = queueIdx;
  const track = currentTrack();
  if (!track) return;

  // Revoke previous audio blob
  if (state.audioBlobURL) {
    URL.revokeObjectURL(state.audioBlobURL);
    state.audioBlobURL = null;
  }

  if (!track.audioData) {
    showToast('Cannot play this track (no audio data)', 'error');
    return;
  }

  const blob = new Blob([track.audioData], { type: track.mimeType || '' });
  state.audioBlobURL = URL.createObjectURL(blob);
  state.audio.src = state.audioBlobURL;
  state.audio.load();

  updateNowPlayingUI();
  updateMiniPlayer();
  highlightCurrentTrack();
  updateMediaSession(track);

  if (autoplay) {
    state.audio.play().then(() => {
      state.isPlaying = true;
      updatePlayPauseIcons();
      updateMediaSessionPlayState();
    }).catch(err => {
      if (err.name !== 'AbortError') {
        showToast('Playback error — tap play to try again', 'error');
      }
    });
  } else {
    state.isPlaying = false;
    updatePlayPauseIcons();
    updateMediaSessionPlayState();
  }
}

function play() {
  if (!currentTrack()) return;
  ensureAudioContext(); // must be called from a user gesture to unlock iOS AudioContext
  state.audio.play().then(() => {
    state.isPlaying = true;
    updatePlayPauseIcons();
    updateMediaSessionPlayState();
  }).catch(() => {});
}

function pause() {
  state.audio.pause();
  state.isPlaying = false;
  updatePlayPauseIcons();
  updateMediaSessionPlayState();
}

function togglePlay() {
  if (state.isPlaying) pause(); else play();
}

function nextTrack(userInitiated) {
  if (state.queue.length === 0) return;
  if (state.repeat === 'one' && !userInitiated) {
    state.audio.currentTime = 0;
    state.audio.play().catch(() => {});
    return;
  }
  const next = state.currentQueueIdx + 1;
  if (next >= state.queue.length) {
    if (state.repeat === 'all') {
      loadTrack(0, true);
    } else {
      // Stop
      state.isPlaying = false;
      state.audio.pause();
      updatePlayPauseIcons();
      updateMediaSessionPlayState();
    }
  } else {
    loadTrack(next, true);
  }
}

function prevTrack() {
  if (state.queue.length === 0) return;
  // If more than 3s in, restart current track
  if (state.audio.currentTime > 3) {
    state.audio.currentTime = 0;
    return;
  }
  const prev = state.currentQueueIdx - 1;
  if (prev < 0) {
    if (state.repeat === 'all') {
      loadTrack(state.queue.length - 1, true);
    } else {
      state.audio.currentTime = 0;
    }
  } else {
    loadTrack(prev, true);
  }
}

state.audio.addEventListener('ended', () => nextTrack(false));

state.audio.addEventListener('timeupdate', () => {
  updateProgress();
  updatePositionState();
});

state.audio.addEventListener('loadedmetadata', () => {
  // Update duration in state/DB
  const track = currentTrack();
  if (track) {
    track.duration = state.audio.duration;
    updateTimeTotalLabel();
    updatePositionState();
    // Persist duration back to DB
    openDB().then(db => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(track);
    }).catch(() => {});
    // Also update library row
    const row = document.querySelector(`.track-item[data-id="${CSS.escape(track.id)}"] .track-duration`);
    if (row) row.textContent = formatTime(track.duration);
  }
});

state.audio.addEventListener('error', () => {
  showToast('Error playing track', 'error');
  nextTrack(false);
});

// Default volume is now set via _gainNode.gain.value = 0.8 in ensureAudioContext()

// ══════════════════════════════════════════════════════════════════════════════
// Media Session API
// ══════════════════════════════════════════════════════════════════════════════
function updateMediaSession(track) {
  if (!('mediaSession' in navigator)) return;
  const artUrl = getArtBlobURL(track);
  const artwork = artUrl
    ? [96, 128, 256, 512].map(s => ({ src: artUrl, sizes: `${s}x${s}`, type: 'image/jpeg' }))
    : [];
  navigator.mediaSession.metadata = new MediaMetadata({
    title: track.title,
    artist: track.artist,
    album: track.album,
    artwork,
  });
  navigator.mediaSession.setActionHandler('play', play);
  navigator.mediaSession.setActionHandler('pause', pause);
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack', () => nextTrack(true));
  navigator.mediaSession.setActionHandler('seekto', e => {
    state.audio.currentTime = e.seekTime;
  });
  navigator.mediaSession.setActionHandler('seekbackward', e => {
    state.audio.currentTime = Math.max(0, state.audio.currentTime - (e.seekOffset || 10));
  });
  navigator.mediaSession.setActionHandler('seekforward', e => {
    state.audio.currentTime = Math.min(state.audio.duration || 0, state.audio.currentTime + (e.seekOffset || 10));
  });
}

function updateMediaSessionPlayState() {
  if (!('mediaSession' in navigator)) return;
  navigator.mediaSession.playbackState = state.isPlaying ? 'playing' : 'paused';
}

function updatePositionState() {
  if (!('mediaSession' in navigator)) return;
  try {
    if (state.audio.duration && isFinite(state.audio.duration)) {
      navigator.mediaSession.setPositionState({
        duration: state.audio.duration,
        playbackRate: state.audio.playbackRate,
        position: state.audio.currentTime,
      });
    }
  } catch (_) {}
}

// ══════════════════════════════════════════════════════════════════════════════
// UI Helpers
// ══════════════════════════════════════════════════════════════════════════════
function formatTime(secs) {
  if (!secs || !isFinite(secs)) return '0:00';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

// ── Library ──────────────────────────────────────────────────────────────────
function renderLibrary() {
  const list = document.getElementById('track-list');
  const empty = document.getElementById('empty-state');
  const stats = document.getElementById('stats-bar');
  const n = state.tracks.length;

  stats.textContent = `${n} ${n === 1 ? 'song' : 'songs'}`;

  if (n === 0) {
    empty.style.display = 'flex';
    list.innerHTML = '';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = '';
  const frag = document.createDocumentFragment();
  state.tracks.forEach((track, i) => {
    const li = document.createElement('li');
    li.className = 'track-item';
    li.dataset.id = track.id;
    li.dataset.index = i;

    const artUrl = getArtBlobURL(track);
    const artHTML = artUrl
      ? `<div class="track-art"><img src="${artUrl}" alt="" loading="lazy"></div>`
      : `<div class="track-art"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px;color:var(--text3)"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>`;

    li.innerHTML = `
      ${artHTML}
      <div class="track-info">
        <div class="track-title">${escapeHTML(track.title)}</div>
        <div class="track-artist">${escapeHTML(track.artist)}</div>
      </div>
      <div class="track-duration">${formatTime(track.duration)}</div>
    `;
    li.addEventListener('click', () => playTrackByIndex(i));
    frag.appendChild(li);
  });
  list.appendChild(frag);
  highlightCurrentTrack();
}

function playTrackByIndex(trackIndex) {
  // Find or rebuild queue so this track is current
  const qIdx = state.queue.indexOf(trackIndex);
  if (qIdx !== -1) {
    loadTrack(qIdx, true);
  } else {
    // Rebuild queue with this track first
    const savedShuffle = state.shuffle;
    state.shuffle = false;
    buildQueue(trackIndex);
    state.shuffle = savedShuffle;
    loadTrack(state.currentQueueIdx, true);
  }
  if (state.currentView === 'library') switchView('nowplaying');
}

function highlightCurrentTrack() {
  const items = document.querySelectorAll('.track-item');
  const track = currentTrack();
  items.forEach(item => {
    item.classList.toggle('active', track && item.dataset.id === track.id);
  });
}

function escapeHTML(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ── Now Playing ───────────────────────────────────────────────────────────────
function updateNowPlayingUI() {
  const track = currentTrack();
  const npTitle = document.getElementById('np-title');
  const npArtist = document.getElementById('np-artist');
  const npArt = document.getElementById('np-art');
  const npArtWrapper = document.getElementById('np-art-wrapper');
  const noArtIcon = npArtWrapper.querySelector('.no-art-icon');

  if (!track) {
    npTitle.textContent = 'No Track Selected';
    npArtist.textContent = '—';
    npArt.style.display = 'none';
    noArtIcon.style.display = 'block';
    return;
  }

  npTitle.textContent = track.title;
  npArtist.textContent = track.artist;

  const artUrl = getArtBlobURL(track);
  if (artUrl) {
    npArt.src = artUrl;
    npArt.style.display = 'block';
    noArtIcon.style.display = 'none';
  } else {
    npArt.style.display = 'none';
    noArtIcon.style.display = 'block';
  }
  updateTimeTotalLabel();
}

function updateProgress() {
  const dur = state.audio.duration;
  const cur = state.audio.currentTime;
  const pct = dur ? (cur / dur) * 100 : 0;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('progress-knob').style.left = `${pct}%`;
  document.getElementById('time-current').textContent = formatTime(cur);
  document.getElementById('mini-progress').style.width = `${pct}%`;
}

function updateTimeTotalLabel() {
  document.getElementById('time-total').textContent = formatTime(state.audio.duration);
}

function updatePlayPauseIcons() {
  document.getElementById('icon-play').style.display = state.isPlaying ? 'none' : 'block';
  document.getElementById('icon-pause').style.display = state.isPlaying ? 'block' : 'none';
  document.getElementById('mini-icon-play').style.display = state.isPlaying ? 'none' : 'block';
  document.getElementById('mini-icon-pause').style.display = state.isPlaying ? 'block' : 'none';
}

// ── Mini Player ───────────────────────────────────────────────────────────────
function updateMiniPlayer() {
  const track = currentTrack();
  const miniPlayer = document.getElementById('mini-player');
  if (!track) { miniPlayer.classList.remove('visible'); return; }
  miniPlayer.classList.add('visible');
  document.getElementById('mini-title').textContent = track.title;
  document.getElementById('mini-artist').textContent = track.artist;

  const miniArtImg = document.getElementById('mini-art-img');
  const artUrl = getArtBlobURL(track);
  const miniArtSvg = document.querySelector('#mini-art svg');
  if (artUrl) {
    miniArtImg.src = artUrl;
    miniArtImg.style.display = 'block';
    if (miniArtSvg) miniArtSvg.style.display = 'none';
  } else {
    miniArtImg.style.display = 'none';
    if (miniArtSvg) miniArtSvg.style.display = 'block';
  }
}

// ── Shuffle / Repeat Buttons ──────────────────────────────────────────────────
function updateShuffleBtn() {
  document.getElementById('btn-shuffle').classList.toggle('active', state.shuffle);
}

function updateRepeatBtn() {
  const btn = document.getElementById('btn-repeat');
  const badge = document.getElementById('repeat-badge');
  const iconAll = document.getElementById('icon-repeat-all');
  const iconOne = document.getElementById('icon-repeat-one');
  btn.classList.toggle('active', state.repeat !== 'off');
  badge.style.display = state.repeat === 'one' ? 'flex' : 'none';
  // Both SVGs show the same icon; badge distinguishes 'one'
  _ = iconAll; _ = iconOne; // both same design, badge does the work
}

// ── View Switching ────────────────────────────────────────────────────────────
function switchView(view) {
  state.currentView = view;
  document.getElementById('library-view').classList.toggle('active', view === 'library');
  document.getElementById('now-playing-view').classList.toggle('active', view === 'nowplaying');
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.view === view);
  });
  // Show/hide mini player only in library view
  const mp = document.getElementById('mini-player');
  if (view === 'library' && currentTrack()) {
    mp.classList.add('visible');
  } else {
    mp.classList.remove('visible');
  }
}

// ══════════════════════════════════════════════════════════════════════════════
// Progress Bar Seeking (Pointer Events)
// ══════════════════════════════════════════════════════════════════════════════
(function setupProgressBar() {
  const bar = document.getElementById('progress-bar-track');
  let dragging = false;

  function getRatio(e) {
    const rect = bar.getBoundingClientRect();
    const x = (e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0)) - rect.left;
    return Math.max(0, Math.min(1, x / rect.width));
  }

  function seek(ratio) {
    if (state.audio.duration) state.audio.currentTime = ratio * state.audio.duration;
    // Update fill immediately
    document.getElementById('progress-fill').style.width = `${ratio * 100}%`;
    document.getElementById('progress-knob').style.left = `${ratio * 100}%`;
    document.getElementById('time-current').textContent = formatTime(ratio * (state.audio.duration || 0));
  }

  bar.addEventListener('pointerdown', e => {
    if (!currentTrack()) return;
    dragging = true;
    bar.classList.add('dragging');
    bar.setPointerCapture(e.pointerId);
    seek(getRatio(e));
  });

  bar.addEventListener('pointermove', e => {
    if (!dragging) return;
    seek(getRatio(e));
  });

  bar.addEventListener('pointerup', e => {
    if (!dragging) return;
    dragging = false;
    bar.classList.remove('dragging');
    seek(getRatio(e));
    bar.releasePointerCapture(e.pointerId);
  });

  bar.addEventListener('pointercancel', () => {
    dragging = false;
    bar.classList.remove('dragging');
  });
})();

// ══════════════════════════════════════════════════════════════════════════════
// Toast & Loading
// ══════════════════════════════════════════════════════════════════════════════
function showToast(msg, type) {
  const container = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'error' ? ' error' : '');
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showLoading(text) {
  document.getElementById('loading-text').textContent = text || 'Loading…';
  document.getElementById('loading-overlay').classList.add('visible');
}

function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('visible');
}

// ══════════════════════════════════════════════════════════════════════════════
// File Import
// ══════════════════════════════════════════════════════════════════════════════
async function handleFiles(fileList) {
  const files = Array.from(fileList).filter(f => AUDIO_EXTS.test(f.name));
  if (files.length === 0) {
    showToast('No supported audio files found', 'error');
    return;
  }

  showLoading(`Importing 0 / ${files.length} tracks…`);

  let added = 0;
  let skipped = 0;

  for (let i = 0; i < files.length; i++) {
    document.getElementById('loading-text').textContent = `Importing ${i + 1} / ${files.length} tracks…`;
    try {
      const meta = await extractMetadata(files[i]);
      const wasAdded = await saveTrack(meta);
      if (wasAdded) {
        state.tracks.push(meta);
        added++;
      } else {
        skipped++;
      }
    } catch (err) {
      skipped++;
    }
  }

  hideLoading();

  if (state.queue.length === 0 && state.tracks.length > 0) {
    buildQueue(0);
  } else {
    buildQueue(state.queue[state.currentQueueIdx]);
  }

  renderLibrary();

  const msg = skipped > 0
    ? `Added ${added} track${added !== 1 ? 's' : ''} (${skipped} skipped)`
    : `Added ${added} track${added !== 1 ? 's' : ''}`;
  showToast(msg);
}

  pause();

  // Revoke all blob URLs
  state.artBlobURLs.forEach(url => URL.revokeObjectURL(url));

  if (state.audioBlobURL) { URL.revokeObjectURL(state.audioBlobURL); state.audioBlobURL = null; }

function syncEQUI() {
  const bands = ['subBass', 'bass', 'mid', 'presence', 'air'];
  bands.forEach(band => {
    const slider = document.getElementById(`eq-${band}`);
    const valEl  = document.getElementById(`eq-val-${band}`);
    if (slider) slider.value = eqState[band];
    if (valEl)  valEl.textContent = eqState[band] > 0 ? `+${eqState[band]}` : String(eqState[band]);
  });
  document.querySelectorAll('.eq-preset-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.preset === eqState.preset);
  });
  const excBtn  = document.getElementById('eq-toggle-exciter');
  const compBtn = document.getElementById('eq-toggle-compressor');
  excBtn.classList.toggle('active', eqState.exciter);
  excBtn.setAttribute('aria-pressed', String(eqState.exciter));
  compBtn.classList.toggle('active', eqState.compressor);
  compBtn.setAttribute('aria-pressed', String(eqState.compressor));
}

document.getElementById('eq-presets').addEventListener('click', e => {
  const btn = e.target.closest('.eq-preset-btn');
  if (!btn || !EQ_PRESETS[btn.dataset.preset]) return;
  Object.assign(eqState, EQ_PRESETS[btn.dataset.preset], { preset: btn.dataset.preset });
  applyEQ(eqState);
  saveEQState();
  syncEQUI();
});

// Band sliders
['subBass', 'bass', 'mid', 'presence', 'air'].forEach(band => {
  const slider = document.getElementById(`eq-${band}`);
  if (!slider) return;
  slider.addEventListener('input', () => {
    const val = parseFloat(slider.value);
    eqState[band] = val;
    eqState.preset = 'custom';
    const valEl = document.getElementById(`eq-val-${band}`);
    if (valEl) valEl.textContent = val > 0 ? `+${val}` : String(val);
    document.querySelectorAll('.eq-preset-btn').forEach(b => b.classList.remove('active'));
    applyEQ(eqState);
    saveEQState();
  });
});

// Toggle pills
document.getElementById('eq-toggle-exciter').addEventListener('click', function() {
  eqState.exciter = !eqState.exciter;
  eqState.preset = 'custom';
  this.classList.toggle('active', eqState.exciter);
  this.setAttribute('aria-pressed', String(eqState.exciter));
  document.querySelectorAll('.eq-preset-btn').forEach(b => b.classList.remove('active'));
  applyEQ(eqState);
  saveEQState();
});
document.getElementById('eq-toggle-compressor').addEventListener('click', function() {
  eqState.compressor = !eqState.compressor;
  eqState.preset = 'custom';
  this.classList.toggle('active', eqState.compressor);
  this.setAttribute('aria-pressed', String(eqState.compressor));
  document.querySelectorAll('.eq-preset-btn').forEach(b => b.classList.remove('active'));
  applyEQ(eqState);
  saveEQState();
});

// ══════════════════════════════════════════════════════════════════════════════
// Init — Load from IndexedDB
// ══════════════════════════════════════════════════════════════════════════════
(async function init() {
  // Load persisted EQ before any audio interaction
  loadEQState();
  syncEQUI();

  try {
    const tracks = await getAllTracks();
    state.tracks = tracks;
    buildQueue(0);
    renderLibrary();
    if (tracks.length > 0) {
      updateNowPlayingUI();
      updateMiniPlayer();
    }
  } catch (err) {
    showToast('Could not load library', 'error');
    renderLibrary();
  }
  updateShuffleBtn();
  updateRepeatBtn();
  updatePlayPauseIcons();
  
  // Update version timestamp
  const versionTimestamp = document.getElementById('version-timestamp');
  if (versionTimestamp) {
    const now = new Date();
    const date = now.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
    const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    versionTimestamp.textContent = `${date} · ${time}`;
  }
  
  // Refresh button handler
  document.getElementById('btn-refresh')?.addEventListener('click', () => {
    location.reload();
  });
})();

// Suppress unused var warning for icon refs
var _ = null;
</script>
